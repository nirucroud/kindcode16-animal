<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KIND CODE16 動物版</title><link rel="stylesheet" href="style.css?v=20260701-8"><style>body[data-page="home"]{margin:0;background:#f4ead0}.page{display:none}.page.active{display:block}.home{padding:0;margin:0 auto;max-width:none;min-height:100svh;overflow:hidden;background:radial-gradient(circle at 12% 35%,rgba(143,126,78,.18) 0 1px,transparent 2px),radial-gradient(circle at 84% 24%,rgba(143,126,78,.16) 0 1px,transparent 2px),linear-gradient(#f7efdc,#ead9ad)}.homeHero{position:relative;width:min(100vw,680px);aspect-ratio:100/151;margin:0 auto;overflow:hidden}.home::after{content:"";display:block;height:max(92px,calc(100svh - min(100vw,680px) * 1.51));background:radial-gradient(ellipse at 18% 20%,rgba(112,126,70,.16) 0 18px,transparent 19px),radial-gradient(ellipse at 78% 36%,rgba(132,110,61,.14) 0 14px,transparent 15px),linear-gradient(#ead9ad,#d9c48e);opacity:.9}.hero{display:block;width:100%;height:100%;object-fit:contain;object-position:center top;border:0;border-radius:0;box-shadow:none}.hotspot{position:absolute;display:block;border:0;background:transparent;color:transparent;font-size:0;line-height:0;padding:0;cursor:pointer;-webkit-tap-highlight-color:rgba(102,114,72,.22)}.hotspot:focus-visible{outline:3px solid rgba(102,114,72,.8);outline-offset:2px;background:rgba(255,248,232,.16)}.hotspotQuizCard{left:5.5%;top:75.9%;width:29%;height:6.3%}.hotspotAnimal{left:35.5%;top:75.9%;width:29%;height:6.3%}.hotspotMystery{left:65.5%;top:75.9%;width:29%;height:6.3%}.hotspotStart{left:34%;top:85.0%;width:32%;height:4.6%;border-radius:999px}@media(max-width:520px){.homeHero{width:100vw}.home::after{height:max(108px,calc(100svh - 151vw))}}</style></head><body data-page="home">
